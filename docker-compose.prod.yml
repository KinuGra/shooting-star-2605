services:
  backend:
    build:
      context: .
      dockerfile: docker/backend/Dockerfile
      target: prod
    ports:
      - "8080:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=prod
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: docker/frontend/Dockerfile
      target: prod
    ports:
      - "3000:3000"
    restart: unless-stopped
    depends_on:
      - backend
