name: CD

on:
  push:
    branches:
      - main

env:
  AWS_REGION: ap-northeast-1
  ECR_BACKEND_REPO: shooting-star-backend
  ECR_FRONTEND_REPO: shooting-star-frontend
  ECS_CLUSTER: shooting-star-cluster
  ECS_SERVICE: shooting-star-service
  ECS_TASK_FAMILY: shooting-star-app

jobs:
  build-backend:
    name: Build & Push Backend
    runs-on: ubuntu-latest
    outputs:
      image: ${{ steps.image.outputs.uri }}
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push backend image
        id: image
        env:
          REGISTRY: ${{ steps.ecr-login.outputs.registry }}
          TAG: main-${{ github.sha }}
        run: |
          IMAGE_URI="${REGISTRY}/${ECR_BACKEND_REPO}:${TAG}"
          docker build \
            --file docker/backend/Dockerfile \
            --target prod \
            --tag "${IMAGE_URI}" \
            .
          docker push "${IMAGE_URI}"
          echo "uri=${IMAGE_URI}" >> "$GITHUB_OUTPUT"

  build-frontend:
    name: Build & Push Frontend
    runs-on: ubuntu-latest
    outputs:
      image: ${{ steps.image.outputs.uri }}
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push frontend image
        id: image
        env:
          REGISTRY: ${{ steps.ecr-login.outputs.registry }}
          TAG: main-${{ github.sha }}
        run: |
          IMAGE_URI="${REGISTRY}/${ECR_FRONTEND_REPO}:${TAG}"
          docker build \
            --file docker/frontend/Dockerfile \
            --target prod \
            --tag "${IMAGE_URI}" \
            .
          docker push "${IMAGE_URI}"
          echo "uri=${IMAGE_URI}" >> "$GITHUB_OUTPUT"

  deploy:
    name: Deploy to ECS
    runs-on: ubuntu-latest
    needs: [build-backend, build-frontend]
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Update ECS task definition with new images
        id: task-def
        env:
          BACKEND_IMAGE: ${{ needs.build-backend.outputs.image }}
          FRONTEND_IMAGE: ${{ needs.build-frontend.outputs.image }}
        run: |
          # 現在のタスク定義を取得し、イメージURIだけ差し替えて新バージョンを登録
          TASK_DEF=$(aws ecs describe-task-definition \
            --task-definition "$ECS_TASK_FAMILY" \
            --query 'taskDefinition' \
            --output json)

          NEW_TASK_DEF=$(echo "$TASK_DEF" | jq \
            --arg backend "$BACKEND_IMAGE" \
            --arg frontend "$FRONTEND_IMAGE" \
            '
              .containerDefinitions = (.containerDefinitions | map(
                if .name == "backend" then .image = $backend
                elif .name == "frontend" then .image = $frontend
                else .
                end
              )) |
              del(.taskDefinitionArn, .revision, .status, .requiresAttributes, .placementConstraints, .compatibilities, .registeredAt, .registeredBy)
            ')

          NEW_TASK_ARN=$(echo "$NEW_TASK_DEF" | \
            aws ecs register-task-definition \
              --cli-input-json file:///dev/stdin \
              --query 'taskDefinition.taskDefinitionArn' \
              --output text)

          echo "task_arn=${NEW_TASK_ARN}" >> "$GITHUB_OUTPUT"

      - name: Deploy to ECS service
        run: |
          aws ecs update-service \
            --cluster "$ECS_CLUSTER" \
            --service "$ECS_SERVICE" \
            --task-definition "${{ steps.task-def.outputs.task_arn }}" \
            --force-new-deployment

      - name: Wait for service to stabilize
        run: |
          aws ecs wait services-stable \
            --cluster "$ECS_CLUSTER" \
            --services "$ECS_SERVICE"
