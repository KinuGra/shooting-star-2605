spring.application.name=shooting-star
server.port=8080

# DevTools hot reload
spring.devtools.restart.enabled=true
spring.devtools.livereload.enabled=true

# springdoc-openapi
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.enabled=true

# DataSource (overridden by env vars in Docker)
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/shootingstar}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:shootingstar}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:shootingstar}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# JWT
jwt.secret=${JWT_SECRET:dev-secret-key-change-in-production-must-be-at-least-64-chars-long}
jwt.expiration-ms=86400000

# Mail (dev: noop, override in prod)
spring.mail.host=${MAIL_HOST:localhost}
spring.mail.port=${MAIL_PORT:1025}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=false
spring.mail.properties.mail.smtp.starttls.enable=false
