services:
  postgres:
    image: postgres:16-alpine
    environment:
      - POSTGRES_DB=shootingstar
      - POSTGRES_USER=shootingstar
      - POSTGRES_PASSWORD=shootingstar
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U shootingstar -d shootingstar"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: docker/backend/Dockerfile
      target: dev
    volumes:
      - ./backend:/app          # Mount source for hot reload
      - gradle-cache:/root/.gradle  # Persist dependency cache
      - /var/run/docker.sock:/var/run/docker.sock  # Docker デーモンへのアクセス (ジャッジ用)
      - /tmp/judge:/tmp/judge  # ジャッジ用コードの受け渡しディレクトリ
    ports:
      - "8080:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=dev
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/shootingstar
      - SPRING_DATASOURCE_USERNAME=shootingstar
      - SPRING_DATASOURCE_PASSWORD=shootingstar
      - JWT_SECRET=979ac53fab6b5b20b6d77fd8116c897129700b7565ebdfc01395424553cc3acb
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: .
      dockerfile: docker/frontend/Dockerfile
      target: dev
    volumes:
      - ./frontend:/app                         # Mount source for hot reload
      - frontend-node-modules:/app/node_modules # Preserve container-installed modules
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8080

volumes:
  gradle-cache:
  frontend-node-modules:
  postgres-data:
